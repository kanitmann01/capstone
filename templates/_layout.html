<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{{ title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css?v=20260426navfix1">
  {% block head_extra %}{% endblock %}
</head>
<body class="{% block body_class %}page-shell{% endblock %}">
  <div class="app-shell">
    <aside class="app-sidebar" aria-label="Brand Guard">
      <a class="sidebar-brand sidebar-brand-link" href="/" aria-label="Brand Guard home"{% if active_page == 'scan' %} aria-current="page"{% endif %}>
        <p class="sidebar-wordmark">Brand Guard</p>
        <p class="sidebar-subtitle">Institutional Authority</p>
      </a>
    </aside>
    <div class="app-main">
      <header class="app-topbar">
        <div class="topbar-left">
          <p class="topbar-wordmark">Brand Guard</p>
          <nav class="topnav" aria-label="Primary">
            {% for item in nav_items %}
            <a class="nav-link{% if active_page == item.id %} is-active{% endif %}" href="{{ item.href }}">{{ item.label }}</a>
            {% endfor %}
          </nav>
        </div>
        <div class="topbar-actions">
          <button id="topbar-run-demo" class="topbar-run-btn" type="button">Run check</button>
          <button class="topbar-icon-btn" type="button" aria-label="Notifications (not used in this build)">
            <span aria-hidden="true">•</span>
          </button>
          <button class="topbar-icon-btn" type="button" aria-label="Account (not used in this build)">
            <span aria-hidden="true">○</span>
          </button>
        </div>
      </header>
      <main class="app-content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
