services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: capstone-app:latest
    container_name: capstone-app
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    environment:
      # Safe defaults when .env.docker is absent or values are omitted.
      CAPSTONE_DATASET_DB: /app/.cache/brand-login-dataset.sqlite3
      THREAT_INTEL_CACHE_DIR: /app/.cache/threat-intel
      FASTTEXT_MODEL_PATH: /app/.cache/fasttext/brand-login.bin
      FASTTEXT_METADATA_PATH: /app/.cache/fasttext/brand-login.json
      FASTTEXT_CORPUS_PATH: /app/data/processed/fasttext_corpus.txt
      CAPSTONE_EVALUATION_DIR: /app/.cache/evaluations
      ML_MODEL_PATH: /app/.cache/ml-artifacts/active_model.keras
      ML_METADATA_PATH: /app/.cache/ml-artifacts/active_model.json
      ML_RUNS_DIR: /app/.cache/ml-jobs
      TF_CPP_MIN_LOG_LEVEL: "2"
      TF_ENABLE_ONEDNN_OPTS: "0"
      CUDA_VISIBLE_DEVICES: "-1"
    volumes:
      - ./.cache:/app/.cache
      - ./data:/app/data
      - ./models:/app/models
      - ./docs:/app/docs
      - ./old-data:/app/old-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  job:
    image: capstone-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - jobs
    env_file:
      - .env.docker
    environment:
      CAPSTONE_DATASET_DB: /app/.cache/brand-login-dataset.sqlite3
      THREAT_INTEL_CACHE_DIR: /app/.cache/threat-intel
      FASTTEXT_MODEL_PATH: /app/.cache/fasttext/brand-login.bin
      FASTTEXT_METADATA_PATH: /app/.cache/fasttext/brand-login.json
      FASTTEXT_CORPUS_PATH: /app/data/processed/fasttext_corpus.txt
      CAPSTONE_EVALUATION_DIR: /app/.cache/evaluations
      ML_MODEL_PATH: /app/.cache/ml-artifacts/active_model.keras
      ML_METADATA_PATH: /app/.cache/ml-artifacts/active_model.json
      ML_RUNS_DIR: /app/.cache/ml-jobs
      TF_CPP_MIN_LOG_LEVEL: "2"
      TF_ENABLE_ONEDNN_OPTS: "0"
      CUDA_VISIBLE_DEVICES: "-1"
    volumes:
      - ./.cache:/app/.cache
      - ./data:/app/data
      - ./models:/app/models
      - ./docs:/app/docs
      - ./old-data:/app/old-data
    command: ["python", "--version"]
